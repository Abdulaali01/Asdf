<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>حفظ الإحداثيات وتصدير Excel</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{
margin:0;
padding:20px;
font-family:tahoma;
background:#f2f2f2;
text-align:center;
}
h2{
margin-bottom:20px;
}
button{
padding:14px 18px;
margin:6px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
color:#fff;
}
#getBtn{background:#007bff;}
#expBtn{background:#28a745;}
#delBtn{background:#dc3545;}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
background:#fff;
font-size:15px;
}
th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}
th{
background:#007bff;
color:#fff;
}
.small{
color:#666;
font-size:14px;
margin-top:8px;
}
</style>
</head>
<body>

<h2>📍 سجل الإحداثيات</h2>

<button id="getBtn" onclick="getLocation()">📍 جلب الإحداثيات</button>
<button id="expBtn" onclick="exportExcel()">📄 تصدير Excel</button>
<button id="delBtn" onclick="clearData()">🗑 حذف الكل</button>

<div class="small">يتم الحفظ تلقائيًا حتى بعد إغلاق الصفحة</div>

<table id="tbl">
<thead>
<tr>
<th>#</th>
<th>الإحداثيات</th>
<th>وقت الجلب</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
let data = JSON.parse(localStorage.getItem("gpsData") || "[]");

renderTable();

function getLocation(){
if(!navigator.geolocation){
alert("الموقع غير مدعوم");
return;
}

navigator.geolocation.getCurrentPosition(function(pos){

let lat = pos.coords.latitude.toFixed(6);
let lon = pos.coords.longitude.toFixed(6);

let now = new Date();
let time = now.toLocaleString("ar-SA");

data.push({
coords: lat + ", " + lon,
time: time
});

localStorage.setItem("gpsData", JSON.stringify(data));
renderTable();

}, function(){
alert("تعذر جلب الموقع");
});
}

function renderTable(){
let tbody = document.querySelector("#tbl tbody");
tbody.innerHTML = "";

data.forEach((row,i)=>{
tbody.innerHTML += `
<tr>
<td>${i+1}</td>
<td>${row.coords}</td>
<td>${row.time}</td>
</tr>
`;
});
}

function exportExcel(){

let rows = [["م", "الإحداثيات", "وقت الجلب"]];

data.forEach((r,i)=>{
rows.push([i+1, r.coords, r.time]);
});

let ws = XLSX.utils.aoa_to_sheet(rows);
let wb = XLSX.utils.book_new();

XLSX.utils.book_append_sheet(wb, ws, "الإحداثيات");

XLSX.writeFile(wb, "سجل_الإحداثيات.xlsx");
}

function clearData(){
if(confirm("حذف جميع البيانات؟")){
data = [];
localStorage.removeItem("gpsData");
renderTable();
}
}
</script>

</body>
</html>
