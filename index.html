<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>كاميرا الإحداثيات</title>

<style>
body{
margin:0;
padding:15px;
background:#111;
font-family:Tahoma;
text-align:center;
color:#fff;
}
video,img{
width:100%;
max-width:420px;
border-radius:15px;
margin-top:10px;
}
button{
padding:14px 22px;
margin:8px;
border:none;
border-radius:12px;
background:#00aaff;
color:#fff;
font-size:18px;
cursor:pointer;
}
button:hover{
background:#0088cc;
}
canvas{display:none;}
</style>
</head>
<body>

<h2>📷 تصوير وحفظ في الاستديو</h2>

<video id="video" autoplay playsinline></video>

<br>
<button onclick="openCam()">تشغيل الكاميرا</button>
<button onclick="capture()">📸 تصوير وحفظ</button>

<img id="preview">

<canvas id="canvas"></canvas>

<script>
let lat="",lon="";

async function openCam(){
try{
const stream=await navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"},
audio:false
});
document.getElementById("video").srcObject=stream;

navigator.geolocation.getCurrentPosition(pos=>{
lat=pos.coords.latitude.toFixed(6);
lon=pos.coords.longitude.toFixed(6);
});
}catch(e){
alert("تعذر تشغيل الكاميرا");
}
}

function capture(){
const video=document.getElementById("video");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

canvas.width=video.videoWidth;
canvas.height=video.videoHeight;

ctx.drawImage(video,0,0,canvas.width,canvas.height);

ctx.fillStyle="rgba(0,0,0,0.55)";
ctx.fillRect(0,canvas.height-140,canvas.width,140);

ctx.fillStyle="#fff";
ctx.font="26px Tahoma";

let now=new Date();
let time=now.toLocaleString("ar-SA");

ctx.fillText("📍 Latitude: "+lat,20,canvas.height-95);
ctx.fillText("📍 Longitude: "+lon,20,canvas.height-60);
ctx.fillText("🕒 "+time,20,canvas.height-25);

let image=canvas.toDataURL("image/jpeg",1);

document.getElementById("preview").src=image;

/* حفظ في الاستديو */
let a=document.createElement("a");
a.href=image;
a.download="GPS_"+Date.now()+".jpg";
a.click();
}
</script>

</body>
</html>
